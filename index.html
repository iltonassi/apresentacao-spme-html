<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>RH na Encruzilhada Algorítmica · Dr. Ilton Assi · SPME 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080d16;--surf:#0e1520;--surf2:#16202e;--brd:#1d2c40;
  --blue:#3b82f6;--blue-l:#60a5fa;--blue-bg:rgba(59,130,246,.1);
  --red:#ef4444;--red-l:#f87171;--red-bg:rgba(239,68,68,.1);
  --grn:#10b981;--grn-l:#34d399;--grn-bg:rgba(16,185,129,.1);
  --gold:#f59e0b;--gold-l:#fbbf24;--gold-bg:rgba(245,158,11,.1);
  --slate:#94a3b8;
  --txt:#e2e8f0;--muted:#64748b;--subtle:#334155;--cite:#475569;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.view{display:none;height:100vh;width:100vw;flex-direction:column}
.view.show{display:flex}

/* ── NAV BAR ── */
#nav-bar{
  display:flex;align-items:center;gap:1rem;padding:.6rem 1.5rem;
  border-top:1px solid var(--brd);background:var(--surf);flex-shrink:0;position:relative;
}
.nb-btn{background:var(--surf2);border:1px solid var(--brd);color:var(--txt);
  border-radius:6px;padding:.35rem .8rem;cursor:pointer;font-size:.82rem}
.nb-btn:disabled{opacity:.3;cursor:default}
.nb-btn:not(:disabled):hover{border-color:var(--blue);color:var(--blue-l)}
#ctr{font-size:.8rem;color:var(--muted);min-width:55px;text-align:center}
#btn-dash{
  position:absolute;right:1.5rem;
  background:var(--gold-bg);border:1px solid rgba(245,158,11,.3);
  color:var(--gold-l);border-radius:6px;padding:.35rem .9rem;cursor:pointer;font-size:.8rem}
#btn-dash:hover{background:rgba(245,158,11,.2)}

/* ── SLIDE WRAPPER ── */
#slide-wrap{flex:1;overflow:hidden;position:relative}
.slide{
  position:absolute;inset:0;display:flex;flex-direction:column;
  justify-content:center;align-items:flex-start;
  padding:2.5rem 3.5rem 2rem;overflow:hidden;
  opacity:0;transition:opacity .25s ease;pointer-events:none;
}
.slide.active{opacity:1;pointer-events:all}

/* ── CITATION ── */
.cite{
  position:absolute;bottom:.9rem;left:3.5rem;
  font-size:.65rem;color:var(--cite);font-style:italic;max-width:70%;line-height:1.4;
}

/* ── SECTION LEFT BORDER ── */
.s-ctx{border-left:5px solid var(--slate);padding-left:1.5rem}
.s-dado{border-left:5px solid var(--blue);padding-left:1.5rem}
.s-poder{border-left:5px solid var(--red);padding-left:1.5rem}
.s-futuro{border-left:5px solid var(--grn);padding-left:1.5rem}
.s-fw{border-left:5px solid var(--gold);padding-left:1.5rem}

/* ── TYPOGRAPHY ── */
.eyebrow{font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;
  color:var(--muted);margin-bottom:.6rem}
.eyebrow.blue{color:var(--blue-l)}
.eyebrow.red{color:var(--red-l)}
.eyebrow.green{color:var(--grn-l)}
.eyebrow.gold{color:var(--gold-l)}
h1.slide-title{font-size:clamp(2rem,5.5vw,3.5rem);font-weight:900;
  letter-spacing:-.03em;line-height:1.05;margin-bottom:.75rem}
h2.slide-title{font-size:clamp(1.5rem,3.5vw,2.2rem);font-weight:800;
  letter-spacing:-.02em;line-height:1.15;margin-bottom:.75rem}
.lead{font-size:clamp(.9rem,1.8vw,1.05rem);color:var(--muted);
  line-height:1.75;max-width:820px;margin-bottom:1.2rem}

/* ── COVER ── */
.slide-cover{
  align-items:center;text-align:center;
  background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(59,130,246,.12),transparent 70%);
}
.cover-line{width:60px;height:3px;background:linear-gradient(90deg,var(--blue),var(--grn));margin:.8rem auto 1.2rem}
.cover-meta{display:flex;gap:1.5rem;justify-content:center;flex-wrap:wrap;
  font-size:.78rem;color:var(--subtle);margin-top:1.5rem}
.cover-meta span{display:flex;align-items:center;gap:.35rem}

/* ── CARD GRIDS ── */
.cards{display:grid;gap:.75rem;margin-top:1rem;width:100%;max-width:900px}
.cards-2{grid-template-columns:1fr 1fr}
.cards-3{grid-template-columns:repeat(3,1fr)}
.cards-4{grid-template-columns:repeat(4,1fr)}
@media(max-width:700px){.cards-2,.cards-3,.cards-4{grid-template-columns:1fr}}
.card{background:var(--surf2);border:1px solid var(--brd);border-radius:10px;padding:1.1rem 1.2rem}
.card.blue-b{border-left:3px solid var(--blue)}
.card.red-b{border-left:3px solid var(--red)}
.card.grn-b{border-left:3px solid var(--grn)}
.card.gold-b{border-left:3px solid var(--gold)}
.card-icon{font-size:1.2rem;margin-bottom:.4rem}
.card strong{font-size:.88rem;display:block;margin-bottom:.3rem}
.card small{font-size:.78rem;color:var(--muted);line-height:1.5}

/* ── STAT BIG ── */
.stat-block{text-align:center;max-width:800px;margin:0 auto;width:100%}
.stat-pre{font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem}
.stat-num{font-size:clamp(5rem,16vw,9rem);font-weight:900;letter-spacing:-.05em;line-height:1}
.stat-num.blue{color:var(--blue-l)}
.stat-num.red{color:var(--red-l)}
.stat-num.gold{color:var(--gold-l)}
.stat-label{font-size:clamp(.95rem,2.2vw,1.2rem);color:var(--txt);max-width:620px;
  margin:.6rem auto;line-height:1.6}
.stat-sub{font-size:.88rem;color:var(--muted)}

/* ── SECTION HEADER SLIDE ── */
.slide-sec{
  justify-content:flex-start;padding-top:3.5rem;
}
.sec-num{font-size:7rem;font-weight:900;opacity:.06;line-height:1;
  margin-bottom:-.5rem;color:white}
.sec-label{font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}
.sec-title{font-size:clamp(3rem,8vw,5.5rem);font-weight:900;letter-spacing:-.04em;margin:.2rem 0}
.sec-sub{font-size:clamp(.9rem,1.8vw,1.1rem);color:var(--muted);max-width:550px;line-height:1.6}

/* ── COMPARISON COLS ── */
.comp-wrap{display:grid;grid-template-columns:1fr 1fr;gap:1rem;
  margin-top:1rem;max-width:900px;width:100%}
.comp-col{background:var(--surf2);border:1px solid var(--brd);border-radius:10px;padding:1.2rem}
.comp-col-head{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;
  font-weight:700;padding-bottom:.75rem;border-bottom:1px solid var(--brd);margin-bottom:.75rem}
.comp-col.blue .comp-col-head{color:var(--blue-l);border-color:rgba(59,130,246,.3)}
.comp-col.grn .comp-col-head{color:var(--grn-l);border-color:rgba(16,185,129,.3)}
.comp-col.red .comp-col-head{color:var(--red-l);border-color:rgba(239,68,68,.3)}
.comp-col ul{list-style:none;display:flex;flex-direction:column;gap:.5rem}
.comp-col li{font-size:.85rem;color:var(--muted);display:flex;gap:.5rem;line-height:1.4}
.comp-col.blue li::before{content:'▸';color:var(--blue-l);flex-shrink:0}
.comp-col.grn li::before{content:'▸';color:var(--grn-l);flex-shrink:0}
.comp-col.red li::before{content:'▸';color:var(--red-l);flex-shrink:0}

/* ── PULL QUOTE ── */
.pquote{
  border-left:3px solid var(--blue-l);background:var(--blue-bg);
  border-radius:0 8px 8px 0;padding:.9rem 1.2rem;
  font-style:italic;font-size:.95rem;line-height:1.6;
  color:var(--txt);max-width:820px;margin-top:.75rem;
}
.pquote.red{border-color:var(--red-l);background:var(--red-bg)}
.pquote.grn{border-color:var(--grn-l);background:var(--grn-bg)}
.pquote.gold{border-color:var(--gold-l);background:var(--gold-bg)}

/* ── STAT ROW (3 stats) ── */
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;
  margin-top:1rem;max-width:900px;width:100%}
.stat-mini{background:var(--surf2);border:1px solid var(--brd);
  border-radius:10px;padding:1.2rem;text-align:center}
.stat-mini .val{font-size:clamp(2rem,5vw,3rem);font-weight:900;letter-spacing:-.03em}
.stat-mini .val.red{color:var(--red-l)}
.stat-mini .val.gold{color:var(--gold-l)}
.stat-mini .val.blue{color:var(--blue-l)}
.stat-mini .lbl{font-size:.78rem;color:var(--muted);margin-top:.4rem;line-height:1.5}
.stat-src{font-size:.7rem;color:var(--subtle);margin-top:.75rem}

/* ── BULLET LIST ── */
.blist{list-style:none;display:flex;flex-direction:column;gap:.7rem;
  max-width:820px;margin-top:.5rem}
.blist li{display:flex;gap:.7rem;font-size:.95rem;color:var(--muted);
  align-items:flex-start;line-height:1.55}
.blist li .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:7px}
.blist li .dot.blue{background:var(--blue-l)}
.blist li .dot.red{background:var(--red-l)}
.blist li .dot.grn{background:var(--grn-l)}
.blist li .dot.gold{background:var(--gold-l)}

/* ── DDD FRAMEWORK ── */
.ddd-wrap{display:flex;align-items:center;gap:.75rem;
  margin-top:1rem;max-width:900px;width:100%;flex-wrap:wrap}
.ddd-card{flex:1;min-width:170px;background:var(--surf2);
  border:1px solid var(--brd);border-radius:10px;padding:1.2rem;text-align:center}
.ddd-n{width:34px;height:34px;border-radius:50%;background:var(--blue-bg);
  border:2px solid var(--blue);color:var(--blue-l);font-weight:800;font-size:.82rem;
  display:flex;align-items:center;justify-content:center;margin:0 auto .75rem}
.ddd-card strong{font-size:.82rem;letter-spacing:.04em;display:block;margin-bottom:.4rem}
.ddd-card p{font-size:.78rem;color:var(--muted);line-height:1.5}
.ddd-arr{font-size:1.4rem;color:var(--subtle);flex-shrink:0}

/* ── MATRIX TABLE ── */
.mtx-wrap{width:100%;max-width:940px;overflow-x:auto;margin-top:.75rem}
.mtx{width:100%;border-collapse:collapse;font-size:.74rem}
.mtx th,.mtx td{border:1px solid var(--brd);padding:.55rem .7rem;text-align:left}
.mtx th{background:var(--surf2);color:var(--muted);font-weight:700;
  font-size:.68rem;text-transform:uppercase;letter-spacing:.04em}
.mtx td:first-child{color:var(--txt);font-weight:600;min-width:110px}
.mtx .c-hi{background:var(--grn-bg);color:var(--grn-l)}
.mtx .c-md{background:var(--gold-bg);color:var(--gold-l)}
.mtx .c-lo{background:var(--red-bg);color:var(--red-l)}

/* ── PRINCIPLES ── */
.princ-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:.65rem;
  margin-top:1rem;max-width:940px;width:100%}
@media(max-width:700px){.princ-grid{grid-template-columns:1fr 1fr}}
.princ{border-radius:9px;padding:.9rem;text-align:center;display:flex;flex-direction:column;gap:.4rem}
.princ strong{font-size:.72rem;display:block}
.princ span{font-size:.72rem;color:var(--muted);line-height:1.4}
.princ.blue{background:var(--blue-bg);border:1px solid rgba(59,130,246,.25)}
.princ.red{background:var(--red-bg);border:1px solid rgba(239,68,68,.25)}
.princ.grn{background:var(--grn-bg);border:1px solid rgba(16,185,129,.25)}
.princ.gold{background:var(--gold-bg);border:1px solid rgba(245,158,11,.25)}
.princ.slate{background:rgba(148,163,184,.08);border:1px solid rgba(148,163,184,.2)}

/* ── QR SLIDE ── */
.qr-wrap{display:grid;grid-template-columns:1fr 220px;gap:2.5rem;
  align-items:center;max-width:900px;width:100%;text-align:left}
.qr-badge{display:inline-block;padding:.28rem .8rem;border-radius:999px;
  font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;font-weight:700;
  background:var(--blue-bg);border:1px solid rgba(59,130,246,.35);
  color:var(--blue-l);margin-bottom:.75rem}
.qr-instr{background:var(--surf2);border:1px solid var(--brd);
  border-radius:8px;padding:.75rem 1rem;font-size:.82rem;color:var(--muted);
  display:flex;align-items:center;gap:.6rem;margin:.75rem 0 .5rem}
.qr-box{background:white;border-radius:10px;padding:10px;
  width:200px;height:200px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.qr-box canvas,.qr-box img{max-width:100%;max-height:100%}
.qr-url{font-size:.65rem;color:var(--muted);word-break:break-all;
  font-family:monospace;margin-top:.4rem;line-height:1.5}

/* ── CONCLUSION ── */
.conc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.9rem;
  margin-top:1rem;max-width:920px;width:100%}
.conc-card{background:var(--surf2);border:1px solid var(--brd);
  border-radius:10px;padding:1.2rem}
.conc-tag{font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;
  font-weight:700;margin-bottom:.5rem}

/* ── CTA SLIDE ── */
.cta-slide{align-items:center;text-align:center;
  background:radial-gradient(ellipse 70% 50% at 50% 100%,rgba(59,130,246,.1),transparent 70%)}
.cta-tags{display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap;margin:1rem 0}
.tag-pill{padding:.28rem .75rem;border-radius:999px;font-size:.72rem;
  background:var(--blue-bg);border:1px solid rgba(59,130,246,.3);color:var(--blue-l)}
.cta-q{background:var(--surf2);border:1px solid var(--brd);border-radius:10px;
  padding:1.2rem 1.5rem;max-width:580px;font-size:1rem;line-height:1.7;margin-top:1rem}

/* ═══════════════════════════════════════
   AUDIENCE VIEW
════════════════════════════════════════ */
#v-aud{
  overflow-y:auto;align-items:center;justify-content:center;
  background:radial-gradient(ellipse 60% 40% at 50% 0%,rgba(59,130,246,.08),transparent 60%),var(--bg);
}
.aud-card{width:100%;max-width:580px;padding:2rem 1.5rem;margin:1.5rem}
.aud-badge{display:inline-block;padding:.28rem .8rem;border-radius:999px;
  font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;font-weight:700;
  background:var(--blue-bg);border:1px solid rgba(59,130,246,.35);
  color:var(--blue-l);margin-bottom:.75rem}
.aud-title{font-size:1.4rem;font-weight:800;margin-bottom:1.2rem;line-height:1.25}
.ctx-box{background:var(--surf2);border:1px solid var(--brd);
  border-radius:9px;padding:.9rem 1.1rem;font-size:.85rem;
  color:var(--muted);line-height:1.6;margin-bottom:1rem}
.aud-q{font-size:.98rem;font-weight:600;margin-bottom:.65rem;color:var(--txt)}
.opt-grid{display:flex;flex-direction:column;gap:.45rem;margin-bottom:1rem}
.opt-btn{background:var(--surf2);border:1px solid var(--brd);
  border-radius:9px;color:var(--txt);padding:.8rem 1rem;text-align:left;
  cursor:pointer;font-size:.88rem;transition:all .15s;line-height:1.4}
.opt-btn:hover{border-color:rgba(59,130,246,.4);background:var(--blue-bg)}
.opt-btn.sel{border-color:var(--blue-l);background:var(--blue-bg);color:var(--blue-l)}
.sc-block{margin-bottom:1.4rem}
.sc-label{font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;
  color:var(--blue-l);font-weight:700;margin-bottom:.3rem}
.q-block{margin-bottom:1.3rem}
textarea{width:100%;background:var(--surf2);border:1px solid var(--brd);
  border-radius:9px;color:var(--txt);padding:.8rem 1rem;font-size:.88rem;
  resize:vertical;font-family:inherit;line-height:1.6;outline:none;margin-bottom:.75rem}
textarea:focus{border-color:rgba(59,130,246,.5)}
textarea::placeholder{color:var(--subtle)}
.sub-btn{width:100%;padding:.9rem;background:var(--blue);border:none;
  border-radius:9px;color:white;font-weight:700;font-size:.95rem;cursor:pointer}
.sub-btn:hover{background:var(--blue-l)}
.ok-box{background:var(--grn-bg);border:1px solid rgba(16,185,129,.3);
  border-radius:10px;padding:1.5rem;text-align:center;
  color:var(--grn-l);font-size:1rem;font-weight:600;line-height:1.6}

/* ═══════════════════════════════════════
   DASHBOARD VIEW
════════════════════════════════════════ */
#v-dash{overflow-y:auto}
#dash-head{
  padding:1rem 1.5rem;border-bottom:1px solid var(--brd);
  background:var(--surf);display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;position:sticky;top:0;z-index:10;
}
#dash-head h2{font-size:1rem;font-weight:700}
.dash-back{background:var(--surf2);border:1px solid var(--brd);
  color:var(--txt);border-radius:6px;padding:.3rem .75rem;cursor:pointer;font-size:.8rem}
#dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:1rem;padding:1.25rem}
.d-card{background:var(--surf);border:1px solid var(--brd);border-radius:10px;padding:1.1rem}
.d-card h3{font-size:.82rem;font-weight:700;margin-bottom:.2rem}
.d-meta{font-size:.72rem;color:var(--muted);margin-bottom:.65rem}
.d-cnt{display:inline-block;padding:.18rem .55rem;border-radius:999px;
  font-size:.68rem;background:var(--blue-bg);border:1px solid rgba(59,130,246,.3);
  color:var(--blue-l);font-weight:700;margin-bottom:.5rem}
.chart-box{position:relative;height:130px;margin-top:.4rem}
.txt-feed{display:flex;flex-direction:column;gap:.4rem;max-height:180px;overflow-y:auto}
.txt-item{background:var(--surf2);border-radius:7px;padding:.55rem .7rem;
  font-size:.78rem;color:var(--muted);line-height:1.5;border:1px solid var(--brd)}
.d-empty{color:var(--subtle);font-size:.78rem;padding:.5rem 0}
.clear-btn{font-size:.68rem;color:var(--red-l);background:none;border:none;
  cursor:pointer;margin-top:.4rem;opacity:.7}
.clear-btn:hover{opacity:1}
.dash-tick{font-size:.68rem;color:var(--subtle);text-align:center;
  padding:.6rem;border-top:1px solid var(--brd);margin-top:.5rem}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--subtle);border-radius:2px}
/* ── PROGRESS BAR ── */
#progress-bar{
  position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--blue),var(--grn));
  transition:width .3s ease;z-index:100;pointer-events:none;
}
/* ── QR URL LINK ── */
.qr-url-link{
  display:flex;align-items:center;gap:.5rem;margin-top:.4rem;
}
.qr-url-link a{
  font-size:.65rem;color:var(--blue-l);word-break:break-all;
  font-family:monospace;line-height:1.5;text-decoration:none;flex:1;
}
.qr-url-link a:hover{text-decoration:underline}
.copy-btn{
  background:var(--surf2);border:1px solid var(--brd);color:var(--muted);
  border-radius:5px;padding:.2rem .5rem;cursor:pointer;font-size:.65rem;white-space:nowrap;
  flex-shrink:0;
}
.copy-btn:hover{color:var(--blue-l);border-color:var(--blue)}
</style>
</head>
<body>

<div id="progress-bar" style="width:0%"></div>
<!-- ══════════════ PRESENTATION VIEW ══════════════ -->
<div id="v-pres" class="view">
  <div id="slide-wrap"></div>
  <div id="nav-bar">
    <button class="nb-btn" id="btn-prev" onclick="nav(-1)">◀</button>
    <span id="ctr">1/26</span>
    <button class="nb-btn" id="btn-next" onclick="nav(1)">▶</button>
    <button id="btn-dash" onclick="location.hash='dashboard'">📊 Respostas ao Vivo</button>
  </div>
</div>

<!-- ══════════════ AUDIENCE VIEW ══════════════ -->
<div id="v-aud" class="view">
  <div class="aud-card" id="aud-content"></div>
</div>

<!-- ══════════════ DASHBOARD VIEW ══════════════ -->
<div id="v-dash" class="view">
  <div id="dash-head">
    <h2>📊 Respostas em Tempo Real</h2>
    <button class="dash-back" onclick="history.back()">← Voltar</button>
  </div>
  <div id="dash-grid"></div>
  <p class="dash-tick" id="dash-tick">Atualiza a cada 5 s</p>
</div>

<script>
// ═══════════════════════════════════════════════════
// 1. EXERCISE DATA
// ═══════════════════════════════════════════════════
const EX = {
  1:{
    title:"Dinâmica 1 · Onde Você Está na Encruzilhada?",
    moment:"Abertura — primeiros 5 min",
    type:"multiMC",
    questions:[
      {id:"q1",text:"Sua organização usa IA em processos de RH?",

function buildSlide(s){
  const cite=s.cite?`<div class="cite">${s.cite}</div>`:"";
  switch(s.type){
    case"cover":return buildCover();
    case"ctx11":return buildCtx11(cite);
    case"ctx12":return buildCtx12(cite);
    case"ctx13":return buildCtx13(cite);
    case"sec-dado":return buildSecHeader("01","DADO","blue","Dataficação e Tomada de Decisão Algorítmica em RH");
    case"dado21":return buildDado21(cite);
    case"dado23":return buildDado23(cite);
    case"dado25":return buildDado25(cite);
    case"dado26":return buildDado26(cite);
    case"sec-poder":return buildSecHeader("02","PODER","red","Controle Algorítmico, Vigilância e Assimetrias de Poder");
    case"poder32":return buildPoder32(cite);
    case"poder33":return buildPoder33(cite);
    case"poder34":return buildPoder34(cite);
    case"sec-futuro":return buildSecHeader("03","FUTURO","grn","Equilíbrio, IA Responsável e Frameworks Práticos");
    case"fut42":return buildFut42(cite);
    case"fut43":return buildFut43(cite);
    case"fut44":return buildFut44(cite);
    case"fw5":return buildFw5(cite);
    case"qr":return buildQR(s.exId);
    case"concl":return buildConcl(cite);
    case"refs":return buildRefs();
    case"cta":return buildCTA();
    default:return`<div class="slide active"><p>${s.type}</p></div>`;
  }
}

function wrap(cls,inner,extra=""){
  return`<div class="slide ${cls} active">${inner}${extra}</div>`;
}

function renderPresentation(idx){

  document.getElementById("progress-bar").style.width=pct+"%";

function nav(d){location.hash=`slide-${curSlide+d}`;}

function genQR(exId){
  const el=document.getElementById(`qr-${exId}`);
  if(!el||typeof QRCode==="undefined") return;
  const url=location.href.split('#')[0]+'#audience-'+exId;
  el.innerHTML="";
  try{
    new QRCode(el,{text:url,width:180,height:180,colorDark:"#000000",colorLight:"#ffffff",correctLevel:QRCode.CorrectLevel.M});
  }catch(e){el.innerHTML=`<p style="font-size:.6rem;color:#333;word-break:break-all">${url}</p>`;}
}

document.addEventListener("keydown",e=>{
  if(!document.getElementById("v-pres").classList.contains("show")) return;
  if(e.key==="ArrowRight"||e.key==="ArrowDown"||e.key===" "){e.preventDefault();nav(1);}
  if(e.key==="ArrowLeft"||e.key==="ArrowUp"){e.preventDefault();nav(-1);}
});

// Touch/swipe for tablets
let _tx=0;
document.getElementById("v-pres").addEventListener("touchstart",e=>{_tx=e.touches[0].clientX;},{passive:true});
document.getElementById("v-pres").addEventListener("touchend",e=>{
  const dx=_tx-e.changedTouches[0].clientX;
  if(Math.abs(dx)>50){dx>0?nav(1):nav(-1);}
},{passive:true});

function copyUrl(exId){
  const url=document.getElementById("qr-url-"+exId).href;
  navigator.clipboard.writeText(url).then(()=>{
    const btn=event.target;btn.textContent="✅ Copiado!";
    setTimeout(()=>{btn.textContent="📋 Copiar";},2000);

function buildAudForm(ex,id){
  if(ex.type==="text"){
    return`${ex.context?`<div class="ctx-box">${ex.context}</div>`:""}

      <textarea id="resp-txt" placeholder="Escreva sua resposta aqui..." rows="5"></textarea>

  }
  if(ex.type==="singleMC"){
    return`${ex.context?`<div class="ctx-box">${ex.context}</div>`:""}
      <p class="aud-q">${ex.question}</p>
      <div class="opt-grid">${ex.options.map((o,i)=>`<button class="opt-btn" onclick="pickAndSend(${id},${i},this)">${o}</button>`).join("")}</div>`;
  }
  if(ex.type==="multiMC"){
    return ex.questions.map(q=>`
      <div class="q-block">
        <p class="aud-q">${q.text}</p>
        <div class="opt-grid" id="og-${q.key}">
          ${q.options.map((o,i)=>`<button class="opt-btn" onclick="pick(this,'og-${q.key}')">${o}</button>`).join("")}
        </div>
      </div>`).join("")+
      `<button class="sub-btn" onclick="submitMulti(${id})">Enviar Respostas →</button>`;
  }
  if(ex.type==="scenarios"){
    return ex.scenarios.map(sc=>`
      <div class="sc-block">
        <div class="sc-label">Cenário ${sc.id}</div>
        <p class="aud-q">${sc.text}</p>
        <div class="opt-grid" id="og-${sc.key}">
          ${sc.options.map((o,i)=>`<button class="opt-btn" onclick="pick(this,'og-${sc.key}')">${o}</button>`).join("")}
        </div>
      </div>`).join("")+
      `<button class="sub-btn" onclick="submitScenarios(${id})">Enviar Respostas →</button>`;
  }
  return"";
}

function pick(btn,gridId){
  document.getElementById(gridId).querySelectorAll(".opt-btn").forEach(b=>b.classList.remove("sel"));
  btn.classList.add("sel");
}

async function pickAndSend(exId,optIdx,btn){
  const ex=EX[exId];
  btn.closest(".opt-grid").querySelectorAll(".opt-btn").forEach(b=>{b.classList.remove("sel");b.disabled=true;});
  btn.classList.add("sel");
  await vote(ex.key,optIdx);
  showOK();
}

async function submitTxt(exId){
  const val=(document.getElementById("resp-txt")||{}).value;
  if(!val||!val.trim()){alert("Por favor, escreva sua resposta.");return;}
  await pushText(EX[exId].key,val.trim());
  showOK();
}

async function submitMulti(exId){
  const ex=EX[exId];
  for(const q of ex.questions){
    const sel=document.querySelector(`#og-${q.key} .opt-btn.sel`);
    if(!sel){alert("Por favor, responda todas as perguntas.");return;}
  }
  for(const q of ex.questions){
    const btns=[...document.querySelectorAll(`#og-${q.key} .opt-btn`)];
    const sel=document.querySelector(`#og-${q.key} .opt-btn.sel`);
    await vote(q.key,btns.indexOf(sel));
  }
  showOK();
}

async function submitScenarios(exId){
  const ex=EX[exId];
  for(const sc of ex.scenarios){
    const sel=document.querySelector(`#og-${sc.key} .opt-btn.sel`);
    if(!sel){alert("Por favor, responda todos os cenários.");return;}
  }
  for(const sc of ex.scenarios){
    const btns=[...document.querySelectorAll(`#og-${sc.key} .opt-btn`)];
    const sel=document.querySelector(`#og-${sc.key} .opt-btn.sel`);
    await vote(sc.key,btns.indexOf(sel));
  }
  showOK();
}

// 6. BACK-END: FIREBASE REALTIME DATABASE (REST)
// ═══════════════════════════════════════════════════
// PASSO 1 → console.firebase.google.com → "Add project" (gratuito)
// PASSO 2 → Build → Realtime Database → "Create database" → modo teste
// PASSO 3 → Copie a URL do banco (ex: https://meu-projeto-default-rtdb.firebaseio.com)
// PASSO 4 → Cole abaixo substituindo "SEU-PROJETO-default-rtdb"
const FB_URL="https://webinar-rh-33d48-default-rtdb.firebaseio.com/";
const FB_NS="/rh-encruzilhada"; // namespace isolado; mude para reiniciar o webinar

function fbOk(){return!FB_URL.includes("https://webinar-rh-33d48-default-rtdb.firebaseio.com/");}

async function fbGet(key){
  if(!fbOk()) return null;
  try{
    const r=await fetch(`${FB_URL}${FB_NS}/${key}.json`);
    const d=await r.json();
    return(d&&typeof d==="object")?d:null;
  }catch(e){return null;}
}

// POST cria filho com ID automático → sem conflito de escrita simultânea
async function fbPost(key,data){
  if(!fbOk()) return;
  try{
    await fetch(`${FB_URL}${FB_NS}/${key}.json`,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(data)
    });
  }catch(e){console.warn("Firebase:",e);}
}

async function fbDel(key){
  if(!fbOk()) return;
  try{await fetch(`${FB_URL}${FB_NS}/${key}.json`,{method:"DELETE"});}catch(e){}
}

// Cada voto = nó independente → sem race condition
async function vote(key,idx){
  await fbPost(key,{opt:idx,ts:Date.now()});
}

async function pushText(key,text){
  await fbPost(key,{t:text.slice(0,500),ts:Date.now()});
}

// Soma votos por opção a partir do objeto Firebase {"-ID":{opt:N,ts:T}, ...}
function tally(data,n){
  const c=new Array(n).fill(0);
  if(data)Object.values(data).forEach(v=>{if(v&&v.opt>=0&&v.opt<n)c[v.opt]++;});
  return c;
}

  }

  if(ex.type==="text"){
    const data=await fbGet(ex.key);
    const arr=data?Object.values(data).sort((a,b)=>a.ts-b.ts):[];
    el.innerHTML=`<div class="d-cnt">${arr.length} respostas</div>
      <div class="txt-feed">${arr.length
        ?arr.slice(-8).reverse().map(r=>`<div class="txt-item">${esc(r.t)}</div>`).join("")
        :"<p class='d-empty'>Nenhuma ainda.</p>"
      }</div>`;

  } else if(ex.type==="singleMC"){
    const data=await fbGet(ex.key);
    const counts=tally(data,ex.options.length);
    const total=counts.reduce((a,b)=>a+b,0);
    el.innerHTML=`<div class="d-cnt">${total} votos</div>
      <div class="chart-box"><canvas id="ch-${id}-m"></canvas></div>`;
    setTimeout(()=>drawChart(`ch-${id}-m`,
      ex.options.map(o=>o.replace(/^[✅⚠️🤔❌]\s*/,"").slice(0,28)),counts),60);

  } else if(ex.type==="multiMC"){
    // Busca todos em paralelo
    const allData=await Promise.all(ex.questions.map(q=>fbGet(q.key)));
    const allCounts=allData.map((d,i)=>tally(d,ex.questions[i].options.length));
    const max=Math.max(...allCounts.map(c=>c.reduce((a,b)=>a+b,0)),0);
    let html=`<div class="d-cnt">≈${max} respondentes</div>`;
    ex.questions.forEach((q,i)=>{
      html+=`<p style="font-size:.7rem;color:var(--muted);margin:.4rem 0 .15rem">${q.text}</p>
             <div style="height:90px"><canvas id="ch-${id}-${q.id}"></canvas></div>`;
    });
    el.innerHTML=html;
    setTimeout(()=>ex.questions.forEach((q,i)=>
      drawChart(`ch-${id}-${q.id}`,q.options.map(o=>o.slice(0,18)),allCounts[i])),60);

  } else if(ex.type==="scenarios"){
    const allData=await Promise.all(ex.scenarios.map(sc=>fbGet(sc.key)));
    const allCounts=allData.map((d,i)=>tally(d,ex.scenarios[i].options.length));
    const max=Math.max(...allCounts.map(c=>c.reduce((a,b)=>a+b,0)),0);
    let html=`<div class="d-cnt">≈${max} votos/cenário</div>`;
    ex.scenarios.forEach((sc,i)=>{
      html+=`<p style="font-size:.7rem;color:var(--muted);margin:.4rem 0 .1rem">Cenário ${sc.id}: ${sc.text.slice(0,45)}…</p>
             <div style="height:80px"><canvas id="ch-${id}-sc${sc.id}"></canvas></div>`;
    });
    el.innerHTML=html;
    setTimeout(()=>ex.scenarios.forEach((sc,i)=>
      drawChart(`ch-${id}-sc${sc.id}`,sc.options,allCounts[i])),60);
  }
}

function drawChart(canvasId,labels,data){
  const canvas=document.getElementById(canvasId);
  if(!canvas) return;
  if(dCharts[canvasId]) try{dCharts[canvasId].destroy();}catch(e){}
  dCharts[canvasId]=new Chart(canvas,{
    type:"bar",
    data:{labels,datasets:[{data,backgroundColor:"rgba(59,130,246,.65)",borderColor:"var(--blue-l)",borderWidth:1}]},
    options:{
      responsive:true,maintainAspectRatio:false,animation:false,
      plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{color:"#64748b",font:{size:9}},grid:{color:"#1d2c40"}},
        y:{ticks:{color:"#64748b",font:{size:9},stepSize:1},grid:{color:"#1d2c40"},beginAtZero:true}
      }
    }
  });
}

async function clearExercise(id){
  if(!confirm(`Limpar todos os dados da Dinâmica ${id}?`)) return;
  const ex=EX[id];
  if(ex.type==="text") await fbDel(ex.key);
  else if(ex.type==="singleMC") await fbDel(ex.key);
  else if(ex.type==="multiMC") await Promise.all(ex.questions.map(q=>fbDel(q.key)));
  else if(ex.type==="scenarios") await Promise.all(ex.scenarios.map(sc=>fbDel(sc.key)));
  renderDashboard();
}

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

// ═══════════════════════════════════════════════════
// 8. ROUTER
// ═══════════════════════════════════════════════════
function showView(name){
  document.querySelectorAll(".view").forEach(v=>v.classList.remove("show"));
  document.getElementById("v-"+name).classList.add("show");
}

function route(){
  clearInterval(dashTimer);
  const h=location.hash.slice(1)||"slide-0";
  if(h.startsWith("slide-")){
    showView("pres");
    renderPresentation(parseInt(h.split("-")[1])||0);
  } else if(h.startsWith("audience-")){
    showView("aud");
    renderAudience(parseInt(h.split("-")[1]));
  } else if(h==="dashboard"){
    showView("dash");
    renderDashboard();
    dashTimer=setInterval(renderDashboard,5000);
  } else {
    showView("pres");
    renderPresentation(0);
  }
}

window.addEventListener("hashchange",route);
window.addEventListener("load",route);
</script>
